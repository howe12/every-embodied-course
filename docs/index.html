<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <title>Every Embodied Course - ROS2机器人仿真课程</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <link rel="stylesheet" href="//cdn.jsdelivr.net/npm/docsify/lib/themes/vue.css">
  <style>
    :root { 
      --theme-color: #00979d;
      --sidebar-width: 280px;
    }
    
    /* 图片居中和大小限制 */
    .markdown-section img {
      display: block;
      margin: 0 auto;
      max-width: 100%;
      max-height: 500px;
      width: auto;
      height: auto;
    }
    
    /* 表格居中 */
    .markdown-section table {
      margin: 0 auto;
      max-width: 100%;
    }
    
    /* 左侧侧边栏 */
    .sidebar-nav > ul > li > a {
      font-size: 16px;
      font-weight: 700;
      color: #1a1a1a;
      padding: 12px 20px;
      border-left: 4px solid transparent;
    }
    
    .sidebar-nav > ul > li > a:hover {
      border-left-color: var(--theme-color);
      color: var(--theme-color);
    }
    
    .sidebar-nav ul ul li a {
      font-size: 14px;
      color: #555;
      padding: 8px 20px 8px 35px;
    }
    
    .sidebar-nav ul ul li a:hover {
      color: var(--theme-color);
    }
    
    .sidebar-nav ul ul li a.active {
      color: var(--theme-color);
      background: rgba(0,151,157,0.12);
      border-left: 3px solid var(--theme-color);
      font-weight: 600;
    }
    
    /* 隐藏三级 */
    .sidebar-nav ul ul ul {
      display: none;
    }
    
    /* 搜索框 */
    .search { margin: 15px; }
    .search input { border-radius: 8px; padding: 8px 15px; }
    
    /* 右侧TOC目录 */
    .toc-right {
      position: fixed;
      right: 15px;
      top: 120px;
      width: 200px;
      max-height: 70vh;
      overflow-y: auto;
      padding: 15px;
      background: #f8f9fa;
      border-radius: 8px;
      border-left: 3px solid var(--theme-color);
      font-size: 13px;
      z-index: 10;
    }
    
    .toc-right h3 {
      font-size: 14px;
      font-weight: 600;
      margin: 0 0 10px 0;
      color: #333;
      padding-bottom: 8px;
      border-bottom: 1px solid #eee;
    }
    
    .toc-right ul {
      list-style: none;
      padding: 0;
      margin: 0;
    }
    
    .toc-right li {
      margin: 6px 0;
    }
    
    .toc-right a {
      color: #666;
      text-decoration: none;
      font-size: 12px;
      display: block;
      padding: 3px 8px;
      border-radius: 4px;
      transition: all 0.2s;
    }
    
    .toc-right a:hover {
      color: var(--theme-color);
      background: rgba(0,151,157,0.1);
    }
    
    .toc-right .toc-h2 {
      font-weight: 600;
      font-size: 13px;
      color: #333;
      margin-top: 10px;
    }
    
    .toc-right .toc-h2:first-child {
      margin-top: 0;
    }
    
    .toc-right .toc-h3 {
      padding-left: 15px;
      font-size: 12px;
    }
    
    /* 内容区域右边距 */
    .markdown-section {
      padding-right: 240px;
    }
    
    @media (max-width: 1200px) {
      .toc-right { display: none; }
      .markdown-section { padding-right: 20px; }
    }
  </style>
</head>
<body>
  <div id="app">加载中...</div>
  
  <!-- 右侧TOC容器 -->
  <div class="toc-right" id="toc-container" style="display:none;">
    <h3>📑 文章目录</h3>
    <div id="toc-list"></div>
  </div>
  
  <script>
    window.$docsify = {
      name: 'Every Embodied Course',
      repo: 'https://github.com/howe12/every-embodied-course',
      loadSidebar: true,
      subMaxLevel: 2,
      auto2top: true,
      search: { 
        maxAge: 86400000, 
        placeholder: '🔍 搜索...',
        noData: '❌ 未找到结果'
      }
    }
  </script>
  <script src="//cdn.jsdelivr.net/npm/docsify@4"></script>
  <script src="//cdn.jsdelivr.net/npm/docsify/lib/plugins/search.min.js"></script>
  
  <script>
    // 生成TOC
    function generateTOC() {
      setTimeout(function() {
        const tocContainer = document.getElementById('toc-container');
        const tocList = document.getElementById('toc-list');
        
        if (!tocContainer || !tocList) {
          console.log('TOC container not found');
          return;
        }
        
        // 查找所有h2和h3标题
        const headings = document.querySelectorAll('.markdown-section h2, .markdown-section h3');
        console.log('Found headings:', headings.length);
        
        if (headings.length === 0) {
          tocContainer.style.display = 'none';
          return;
        }
        
        let html = '<ul>';
        headings.forEach((heading, index) => {
          const id = 'heading-' + index;
          heading.id = id;
          const level = heading.tagName.toLowerCase() === 'h2' ? 'toc-h2' : 'toc-h3';
          const text = heading.textContent.trim();
          if (text) {
            html += `<li class="${level}"><a href="#${id}">${text}</a></li>`;
          }
        });
        html += '</ul>';
        
        tocList.innerHTML = html;
        tocContainer.style.display = 'block';
        console.log('TOC generated');
      }, 500); // 延迟500ms确保页面加载完成
    }
    
    // 页面加载后生成TOC
    document.addEventListener('DOMContentLoaded', generateTOC);
    
    // docsify加载完成后也生成
    window.onload = generateTOC;
  </script>
</body>
</html>

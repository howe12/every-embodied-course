<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <title>Every Embodied Course - ROS2机器人仿真课程</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <link rel="stylesheet" href="//cdn.jsdelivr.net/npm/docsify/lib/themes/vue.css">
  <style>
    :root { 
      --theme-color: #00979d;
      --sidebar-width: 280px;
    }
    
    /* 图片居中和大小限制 */
    .markdown-section img {
      display: block;
      margin: 0 auto;
      max-width: 100%;
      max-height: 500px;
      width: auto;
      height: auto;
    }
    
    /* 表格居中 */
    .markdown-section table {
      margin: 0 auto;
      max-width: 100%;
    }
    
    /* 右侧TOC目录 */
    .toc {
      right: 0;
      top: 0;
      width: 200px;
      max-height: 100vh;
      overflow-y: auto;
      padding: 20px 15px;
      background: #f9f9f9;
      border-left: 1px solid #eee;
      position: fixed;
    }
    
    .toc ul {
      padding-left: 10px;
    }
    
    .toc li {
      margin: 5px 0;
      font-size: 13px;
    }
    
    .toc li a {
      color: #666;
      text-decoration: none;
    }
    
    .toc li a:hover {
      color: var(--theme-color);
    }
    
    .toc-h2 { padding-left: 0; font-weight: 600; }
    .toc-h3 { padding-left: 15px; font-size: 12px; }
    
    /* 侧边栏样式 */
    .sidebar {
      background: #fafafa;
    }
    
    .sidebar-nav > ul > li > a {
      font-size: 16px;
      font-weight: 700;
      color: #1a1a1a;
      padding: 12px 20px;
      border-left: 4px solid transparent;
    }
    
    .sidebar-nav > ul > li > a:hover {
      border-left-color: var(--theme-color);
      color: var(--theme-color);
    }
    
    .sidebar-nav ul ul li a {
      font-size: 14px;
      color: #555;
      padding: 8px 20px 8px 35px;
    }
    
    .sidebar-nav ul ul li a:hover {
      color: var(--theme-color);
    }
    
    .sidebar-nav ul ul li a.active {
      color: var(--theme-color);
      background: rgba(0,151,157,0.12);
      border-left: 3px solid var(--theme-color);
      font-weight: 600;
    }
    
    /* 搜索框 */
    .search { margin: 15px; }
    .search input { border-radius: 8px; padding: 8px 15px; }
    
    /* 内容区域右边距 */
    .markdown-section {
      padding-right: 220px;
    }
  </style>
</head>
<body>
  <div id="app">加载中...</div>
  <script>
    window.$docsify = {
      name: 'Every Embodied Course',
      repo: 'https://github.com/howe12/every-embodied-course',
      loadSidebar: true,
      subMaxLevel: 3,
      auto2top: true,
      toc:
      {
        tocLevel1: true,
        tocLevel2: true,
        tocLevel3: true,
        scope: '.markdown-section',
        heading: 'h2, h3'
      },
      search: { 
        maxAge: 86400000, 
        placeholder: '🔍 搜索...',
        noData: '❌ 未找到结果'
      },
    }
  </script>
  <script src="//cdn.jsdelivr.net/npm/docsify@4"></script>
  <script src="//cdn.jsdelivr.net/npm/docsify/lib/plugins/search.min.js"></script>
  <script src="//cdn.jsdelivr.net/npm/docsify-toc@1.1.0/dist/docsify-toc.min.js"></script>
</body>
</html>

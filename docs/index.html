<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <title>Every Embodied Course - ROS2机器人仿真课程</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <link rel="stylesheet" href="//cdn.jsdelivr.net/npm/docsify/lib/themes/vue.css">
  <style>
    :root { 
      --theme-color: #00979d;
      --sidebar-width: 260px;
    }
    
    /* 图片居中 */
    .markdown-section img {
      display: block;
      margin: 0 auto;
      max-width: 100%;
    }
    
    /* 表格居中 */
    .markdown-section table {
      margin: 0 auto;
    }
    
    /* 侧边栏样式优化 */
    .sidebar-nav > ul > li > a {
      font-weight: bold;
      color: #333;
      padding: 8px 15px;
      border-left: 3px solid transparent;
    }
    
    .sidebar-nav > ul > li > a:hover {
      background: #f5f5f5;
      border-left-color: var(--theme-color);
    }
    
    .sidebar-nav ul ul li a {
      padding: 6px 15px 6px 25px;
      font-size: 14px;
      color: #666;
    }
    
    .sidebar-nav ul ul li a:hover {
      color: var(--theme-color);
      background: #f9f9f9;
    }
    
    .sidebar-nav ul ul li a.active {
      color: var(--theme-color);
      border-left: 3px solid var(--theme-color);
      background: #f0f7f7;
    }
    
    /* 章节分组样式 */
    .sidebar-nav > ul > li > span {
      display: block;
      padding: 10px 15px 5px;
      font-size: 12px;
      color: #999;
      text-transform: uppercase;
      letter-spacing: 1px;
    }
    
    /* 搜索框样式 */
    .search {
      margin-bottom: 15px;
    }
    
    .search input {
      border-radius: 20px;
    }
  </style>
</head>
<body>
  <div id="app">加载中...</div>
  <script>
    window.$docsify = {
      name: 'Every Embodied Course',
      repo: 'https://github.com/howe12/every-embodied-course',
      loadSidebar: true,
      subMaxLevel: 3,
      auto2top: true,
      search: { 
        maxAge: 86400000, 
        placeholder: '搜索',
        noData: '未找到结果!'
      },
    }
  </script>
  <script src="//cdn.jsdelivr.net/npm/docsify@4"></script>
  <script src="//cdn.jsdelivr.net/npm/docsify/lib/plugins/search.min.js"></script>
</body>
</html>

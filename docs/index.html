<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <title>Every Embodied Course - ROS2机器人仿真课程</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <link rel="stylesheet" href="//cdn.jsdelivr.net/npm/docsify/lib/themes/vue.css">
  <style>
    :root { 
      --theme-color: #00979d;
      --sidebar-width: 280px;
    }
    
    /* 图片居中和大小限制 */
    .markdown-section img {
      display: block;
      margin: 0 auto;
      max-width: 100%;
      max-height: 500px;
      width: auto;
      height: auto;
    }
    
    /* 表格居中 */
    .markdown-section table {
      margin: 0 auto;
      max-width: 100%;
    }
    
    /* 左侧侧边栏 - 仅显示一级和二级 */
    .sidebar-nav > ul > li > a {
      font-size: 16px;
      font-weight: 700;
      color: #1a1a1a;
      padding: 12px 20px;
      border-left: 4px solid transparent;
    }
    
    .sidebar-nav > ul > li > a:hover {
      border-left-color: var(--theme-color);
      color: var(--theme-color);
    }
    
    .sidebar-nav > ul > li > ul {
      display: block;
    }
    
    .sidebar-nav ul ul li a {
      font-size: 14px;
      color: #555;
      padding: 8px 20px 8px 35px;
    }
    
    .sidebar-nav ul ul li a:hover {
      color: var(--theme-color);
    }
    
    .sidebar-nav ul ul li a.active {
      color: var(--theme-color);
      background: rgba(0,151,157,0.12);
      border-left: 3px solid var(--theme-color);
      font-weight: 600;
    }
    
    /* 隐藏三级及以下的左侧目录 */
    .sidebar-nav ul ul ul {
      display: none;
    }
    
    /* 搜索框 */
    .search { margin: 15px; }
    .search input { border-radius: 8px; padding: 8px 15px; }
    
    /* 右侧TOC - 浮动目录 */
    .docsify-toc {
      position: fixed;
      right: 20px;
      top: 100px;
      max-height: calc(100vh - 150px);
      overflow-y: auto;
      padding: 15px;
      background: #f9f9f9;
      border-radius: 8px;
      border: 1px solid #eee;
      font-size: 13px;
      z-index: 100;
      opacity: 0;
      transition: opacity 0.3s ease;
    }
    
    .docsify-toc:hover,
    body.toc-active .docsify-toc {
      opacity: 1;
    }
    
    .docsify-toc ul {
      padding-left: 15px;
      margin: 0;
    }
    
    .docsify-toc li {
      margin: 5px 0;
      list-style: none;
    }
    
    .docsify-toc li a {
      color: #666;
      text-decoration: none;
      display: block;
      padding: 3px 0;
    }
    
    .docsify-toc li a:hover {
      color: var(--theme-color);
    }
    
    .docsify-toc-h2 {
      font-weight: 600;
      color: #333;
      margin-top: 10px;
    }
    
    .docsify-toc-h3 {
      font-size: 12px;
      padding-left: 15px;
    }
    
    /* 内容区域右边距 */
    .markdown-section {
      padding-right: 230px;
    }
    
    /* 滚动时显示TOC的提示 */
    @media (min-width: 1200px) {
      .docsify-toc {
        opacity: 0.3;
      }
    }
  </style>
</head>
<body>
  <div id="app">加载中...</div>
  <script>
    window.$docsify = {
      name: 'Every Embodied Course',
      repo: 'https://github.com/howe12/every-embodied-course',
      loadSidebar: true,
      subMaxLevel: 2,  // 左侧只显示2级
      auto2top: true,
      search: { 
        maxAge: 86400000, 
        placeholder: '🔍 搜索...',
        noData: '❌ 未找到结果'
      },
    }
  </script>
  <script src="//cdn.jsdelivr.net/npm/docsify@4"></script>
  <script src="//cdn.jsdelivr.net/npm/docsify/lib/plugins/search.min.js"></script>
  <script src="//cdn.jsdelivr.net/npm/docsify-toc@1.1.0/dist/docsify-toc.min.js"></script>
</body>
</html>

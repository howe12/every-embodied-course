<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <title>Every Embodied Course - ROS2机器人仿真课程</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <link rel="stylesheet" href="//cdn.jsdelivr.net/npm/docsify/lib/themes/vue.css">
  <style>
    :root { 
      --theme-color: #00979d;
      --sidebar-width: 280px;
    }
    
    /* 图片居中 */
    .markdown-section img {
      display: block;
      margin: 0 auto;
      max-width: 100%;
    }
    
    /* 表格居中 */
    .markdown-section table {
      margin: 0 auto;
    }
    
    /* 侧边栏整体样式 */
    .sidebar {
      background: #fafafa;
    }
    
    .sidebar-toggle {
      background: var(--theme-color);
    }
    
    /* 章节标题 (01, 02) - 一级 */
    .sidebar-nav > ul > li > a {
      font-size: 16px;
      font-weight: 700;
      color: #1a1a1a;
      padding: 12px 20px;
      border-left: 4px solid transparent;
      background: linear-gradient(90deg, transparent 0%, rgba(0,151,157,0.05) 100%);
    }
    
    .sidebar-nav > ul > li > a:hover {
      background: linear-gradient(90deg, rgba(0,151,157,0.1) 0%, transparent 100%);
      border-left-color: var(--theme-color);
      color: var(--theme-color);
    }
    
    /* 子目录标题样式 */
    .sidebar-nav ul ul {
      margin-top: 5px;
    }
    
    .sidebar-nav ul ul li a {
      font-size: 14px;
      color: #555;
      padding: 8px 20px 8px 35px;
      border-left: 2px solid transparent;
      margin: 2px 0;
    }
    
    .sidebar-nav ul ul li a:hover {
      color: var(--theme-color);
      background: rgba(0,151,157,0.08);
      border-left-color: var(--theme-color);
    }
    
    .sidebar-nav ul ul li a.active {
      color: var(--theme-color);
      background: rgba(0,151,157,0.12);
      border-left: 3px solid var(--theme-color);
      font-weight: 600;
    }
    
    /* 目录缩进层级 */
    .sidebar-nav ul ul ul li a {
      padding-left: 55px;
      font-size: 13px;
      color: #777;
    }
    
    /* 搜索框 */
    .search {
      margin: 15px;
    }
    
    .search input {
      border-radius: 8px;
      padding: 8px 15px;
      border: 1px solid #ddd;
    }
    
    .search input:focus {
      border-color: var(--theme-color);
      box-shadow: 0 0 0 2px rgba(0,151,157,0.2);
    }
    
    /* 滚动条美化 */
    .sidebar::-webkit-scrollbar {
      width: 6px;
    }
    
    .sidebar::-webkit-scrollbar-thumb {
      background: #ccc;
      border-radius: 3px;
    }
    
    .sidebar::-webkit-scrollbar-thumb:hover {
      background: #aaa;
    }
  </style>
</head>
<body>
  <div id="app">加载中...</div>
  <script>
    window.$docsify = {
      name: 'Every Embodied Course',
      repo: 'https://github.com/howe12/every-embodied-course',
      loadSidebar: true,
      subMaxLevel: 3,
      auto2top: true,
      search: { 
        maxAge: 86400000, 
        placeholder: '🔍 搜索...',
        noData: '❌ 未找到结果'
      },
    }
  </script>
  <script src="//cdn.jsdelivr.net/npm/docsify@4"></script>
  <script src="//cdn.jsdelivr.net/npm/docsify/lib/plugins/search.min.js"></script>
</body>
</html>

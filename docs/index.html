<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <title>Every Embodied Course - ROS2机器人仿真课程</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <link rel="stylesheet" href="//cdn.jsdelivr.net/npm/docsify/lib/themes/vue.css">
  <style>
    :root { 
      --theme-color: #00979d;
      --sidebar-width: 280px;
    }
    
    .markdown-section img {
      display: block;
      margin: 0 auto;
      max-width: 100%;
      max-height: 500px;
    }
    
    /* 图片图注居中 */
    .markdown-section p img + em,
    .markdown-section p img + strong,
    .markdown-section p:has(img) + p,
    .markdown-section p img ~ p:not(:has(img)) {
      text-align: center;
      color: #666;
      font-size: 12px;
      font-style: normal;
      margin-top: 8px;
      display: block;
    }
    
    /* 引用格式的图注 */
    .markdown-section p img + blockquote {
      text-align: center;
      color: #666;
      font-size: 12px;
      font-style: normal;
      margin-top: 8px;
      border-left: none;
      padding: 0;
    }
    
    .markdown-section table {
      margin: 0 auto;
      max-width: 100%;
    }
    
    /* 左侧侧边栏 - 一级标题和首页 */
    .sidebar-nav > ul > li > a {
      font-size: 14px;
      font-weight: 600;
      color: #006644;
      padding: 8px 15px 8px 25px;
      border-left: 3px solid transparent;
      margin: 2px 8px;
    }
    
    .sidebar-nav > ul > li > a:hover {
      background: rgba(0,151,157,0.1);
      border-left-color: var(--theme-color);
      color: var(--theme-color);
    }
    
    .sidebar-nav ul ul li a {
      font-size: 14px;
      color: #555;
      padding: 8px 20px 8px 35px;
    }
    
    .sidebar-nav ul ul li a:hover {
      color: var(--theme-color);
    }
    
    .sidebar-nav ul ul li a.active {
      color: var(--theme-color);
      background: rgba(0,151,157,0.12);
      border-left: 3px solid var(--theme-color);
      font-weight: 600;
    }
    
    .sidebar-nav ul ul ul {
      display: none;
    }
    
    .search { margin: 15px; }
    .search input { border-radius: 8px; padding: 8px 15px; }
    
    .toc-right {
      position: fixed;
      right: 15px;
      top: 100px;
      width: 180px;
      max-height: 75vh;
      overflow-y: auto;
      padding: 12px;
      background: #f8f9fa;
      border-radius: 8px;
      border-left: 3px solid var(--theme-color);
      font-size: 13px;
      z-index: 100;
    }
    
    .toc-right h4 {
      font-size: 13px;
      font-weight: 600;
      margin: 0 0 8px 0;
      color: #333;
      border-bottom: 1px solid #eee;
      padding-bottom: 6px;
    }
    
    .toc-right ul {
      list-style: none;
      padding: 0;
      margin: 0;
    }
    
    .toc-right li {
      margin: 4px 0;
    }
    
    .toc-right a {
      color: #666;
      text-decoration: none;
      font-size: 12px;
      display: block;
      padding: 2px 6px;
      border-radius: 3px;
    }
    
    .toc-right a:hover {
      color: var(--theme-color);
      background: rgba(0,151,157,0.1);
    }
    
    .toc-h2 { font-weight: 600; font-size: 12px; color: #333; }
    .toc-h3 { padding-left: 10px; font-size: 11px; }
    
    .markdown-section {
      padding-right: 220px;
    }
    
    @media (max-width: 1200px) {
      .toc-right { display: none; }
      .markdown-section { padding-right: 20px; }
    }
  </style>
</head>
<body>
  <div id="app">加载中...</div>
  
  <div class="toc-right" id="toc">
    <h4>📑 文章目录</h4>
    <div id="toc-content"></div>
  </div>
  
  <script>
    window.$docsify = {
      name: 'Every Embodied Course',
      repo: 'https://github.com/howe12/every-embodied-course',
      loadSidebar: true,
      subMaxLevel: 2,
      auto2top: true,
      search: { 
        maxAge: 86400000, 
        placeholder: '🔍 搜索...',
        noData: '❌ 未找到结果'
      }
    }
  </script>
  <script src="//cdn.jsdelivr.net/npm/docsify@4"></script>
  <script src="//cdn.jsdelivr.net/npm/docsify/lib/plugins/search.min.js"></script>
  
  <script>
    function slugify(text) {
      return text.toLowerCase()
        .replace(/[^\u4e00-\u9fa5a-zA-Z0-9\s-]/g, '')
        .replace(/\s+/g, '-')
        .replace(/-+/g, '-')
        .trim() || 'section';
    }
    
    function initTOC() {
      var content = document.getElementById('toc-content');
      if (!content) return;
      
      var headings = document.querySelectorAll('.markdown-section h2, .markdown-section h3');
      if (headings.length === 0) {
        content.innerHTML = '<p style="color:#999;font-size:12px;">暂无目录</p>';
        return;
      }
      
      var html = '<ul>';
      
      headings.forEach(function(h, i) {
        var tag = h.tagName.toLowerCase();
        var cls = tag === 'h2' ? 'toc-h2' : 'toc-h3';
        var text = h.textContent.trim();
        
        var anchor = h.querySelector('a.anchor');
        var anchorId = '';
        
        if (anchor) {
          anchorId = anchor.getAttribute('href').replace('#', '');
        } else if (h.id) {
          anchorId = h.id;
        } else {
          anchorId = slugify(text);
          h.id = anchorId;
        }
        
        html += '<li class="' + cls + '"><a href="#' + anchorId + '">' + text + '</a></li>';
      });
      
      html += '</ul>';
      content.innerHTML = html;
    }
    
    function setupListeners() {
      setTimeout(initTOC, 800);
      window.addEventListener('hashchange', function() {
        setTimeout(initTOC, 800);
      });
      window.addEventListener('popstate', function() {
        setTimeout(initTOC, 800);
      });
    }
    
    if (document.readyState === 'loading') {
      document.addEventListener('DOMContentLoaded', setupListeners);
    } else {
      setupListeners();
    }
  </script>
</body>
</html>

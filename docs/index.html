<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <title>Every Embodied Course - ROS2机器人仿真课程</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  
  <!-- 主题CSS -->
  <link rel="stylesheet" href="//cdn.jsdelivr.net/npm/docsify/lib/themes/vue.css">
  
  <!-- 自定义样式 -->
  <style>
    :root { 
      --theme-color: #42b983;
    }
    
    /* 隐藏sidebar展开/折叠按钮 */
    .sidebar-toggle { display: none !important; }
    
    /* 隐藏sidebar顶部的大标题（Every Embodied Course） */
    .sidebar-nav > h1, .sidebar-nav h1, div.sidebar-nav > h1, section.sidebar > h1,
    .sidebar-nav > p, .sidebar-nav p, .sidebar .app-name, .sidebar .app-name-link,
    .sidebar-nav .brand {
      display: none !important;
      visibility: hidden !important;
    }
    
    /* 左侧sidebar固定 */
    .sidebar-nav {
      position: fixed !important;
      top: 0;
      height: 100vh;
      overflow-y: auto;
    }
    
    /* 图片居中 */
    .markdown-section img {
      display: block;
      margin: 0 auto;
      max-width: 100%;
      max-height: 500px;
    }
    
    /* 表格居中 */
    .markdown-section table { margin: 0 auto; max-width: 100%; }
    
    /* 侧边栏样式 - 简洁版 */
    .sidebar-nav > ul > li > a {
      font-size: 13px;
      font-weight: 600;
      color: #2d8f6f;
      padding: 6px 15px 6px 20px;
      border-left: 3px solid transparent;
      margin: 2px 8px;
    }
    .sidebar-nav > ul > li > a:hover {
      background: rgba(45,143,111,0.1);
      border-left-color: #2d8f6f;
      color: #2d8f6f;
    }
    .sidebar-nav ul ul li a {
      font-size: 13px;
      color: #3a7d5c;
      padding: 5px 15px 5px 30px;
    }
    .sidebar-nav ul ul li a:hover { color: #2d8f6f; }
    .sidebar-nav ul ul li a.active {
      color: #2d8f6f;
      background: rgba(45,143,111,0.12);
      border-left: 3px solid #2d8f6f;
      font-weight: 500;
    }
    .sidebar-nav ul ul ul { display: none; }
    
    /* 内容区padding */
    .markdown-section { padding-right: 220px; padding-left: 235px; }
    
    @media (max-width: 1200px) {
      .markdown-section { padding-right: 20px; }
    }
    
    /* 手机端适配 */
    @media (max-width: 768px) {
      .sidebar-nav { transform: translateX(-100%) !important; width: 200px !important; }
      .sidebar-nav.open { transform: translateX(0) !important; }
      .markdown-section { padding-left: 20px !important; padding-right: 20px !important; }
    }
    
    /* 目录插件样式 */
    .toc-right {
      position: fixed;
      right: 15px;
      top: 100px;
      width: 180px;
      max-height: 75vh;
      overflow-y: auto;
      padding: 12px;
      background: #f8f9fa;
      border-radius: 8px;
      border-left: 3px solid var(--theme-color);
      font-size: 13px;
      z-index: 100;
    }
    .toc-right h4 { font-size: 13px; font-weight: 600; margin: 0 0 8px 0; color: #333; border-bottom: 1px solid #eee; padding-bottom: 6px; }
    .toc-right ul { list-style: none; padding: 0; margin: 0; }
    .toc-right li { margin: 4px 0; }
    .toc-right a { color: #666; text-decoration: none; font-size: 12px; display: block; padding: 2px 6px; border-radius: 3px; }
    .toc-right a:hover { color: var(--theme-color); background: rgba(66,185,131,0.1); }
    .toc-h2 { font-weight: 600; font-size: 12px; color: #333; }
    .toc-h3 { padding-left: 10px; font-size: 11px; }
    @media (max-width: 1200px) { .toc-right { display: none; } }
  </style>
</head>

<body>
  <div id="app">加载中...</div>
  
  <!-- 右侧目录 -->
  <div class="toc-right" id="toc">
    <h4>📑 文章目录</h4>
    <div id="toc-content"></div>
  </div>
  
  <!-- Docsify 配置 -->
  <script>
    window.$docsify = {
      name: 'Every Embodied Course',
      repo: 'https://github.com/howe12/every-embodied-course',
      loadSidebar: true,
      subMaxLevel: 0,
      auto2top: true
    }
  </script>
  
  <!-- Docsify 核心 -->
  <script src="//cdn.jsdelivr.net/npm/docsify@latest/lib/docsify.min.js"></script>
  
  <!-- 图片放大插件 -->
  <script src="//cdn.jsdelivr.net/npm/docsify/lib/plugins/zoom-image.min.js"></script>
  
  <!-- 复制代码插件 -->
  <script src="//cdn.jsdelivr.net/npm/docsify-copy-code"></script>
  
  <!-- KaTeX 公式支持 -->
  <script src="https://cdn.jsdelivr.net/npm/katex@latest/dist/katex.min.js"></script>
  <link rel="stylesheet" href="//cdn.jsdelivr.net/npm/katex@latest/dist/katex.min.css" />
  <script src="https://cdn.jsdelivr.net/npm/marked@3"></script>
  <script src="//cdn.jsdelivr.net/npm/docsify-katex@latest/dist/docsify-katex.js"></script>
  
  <!-- 目录生成脚本 -->
  <script>
    function slugify(text) {
      return text.toLowerCase()
        .replace(/[^\u4e00-\u9fa5a-zA-Z0-9\s-]/g, '')
        .replace(/\s+/g, '-')
        .replace(/-+/g, '-')
        .trim() || 'section';
    }
    
    function initTOC() {
      var content = document.getElementById('toc-content');
      if (!content) return;
      
      setTimeout(function() {
        var headings = document.querySelectorAll('.markdown-section h2, .markdown-section h3');
        if (headings.length === 0) {
          content.innerHTML = '<p style="color:#999;font-size:12px;">暂无目录</p>';
          return;
        }
        
        var html = '<ul>';
        headings.forEach(function(h) {
          var tag = h.tagName.toLowerCase();
          var cls = tag === 'h2' ? 'toc-h2' : 'toc-h3';
          var text = h.textContent.trim();
          
          var anchor = h.querySelector('a.anchor');
          var anchorId = '';
          
          if (anchor && anchor.getAttribute('href')) {
            anchorId = anchor.getAttribute('href').replace('#', '');
          } else if (h.id) {
            anchorId = h.id;
          } else {
            anchorId = slugify(text);
            h.id = anchorId;
          }
          
          html += '<li class="' + cls + '"><a href="#' + anchorId + '">' + text + '</a></li>';
        });
        
        html += '</ul>';
        content.innerHTML = html;
      }, 500);
    }
    
    setTimeout(initTOC, 1000);
    
    window.addEventListener('hashchange', function() {
      setTimeout(initTOC, 800);
    });
  </script>
  
  <!-- 移除 sidebar 标题 -->
  <script>
    setTimeout(function() {
      var h1 = document.querySelector('.sidebar-nav > h1');
      if (h1) h1.style.display = 'none';
    }, 500);
  </script>
</body>
</html>
